services:
  nginx:
    image: nginx:latest
    container_name: nginx

    ports:
      - "80:80"   # HTTP
      - "443:443" # HTTPS

    volumes:
      - ./nginx.conf:/etc/nginx/nginx.conf:ro

    restart: unless-stopped

    environment:
      - TZ=Europe/Copenhagen

    networks:
      - homelab

networks:
  homelab:
    external: true